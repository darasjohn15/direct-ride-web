name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy to S3
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET || secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    defaults:
      run:
        working-directory: direct-ride-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: direct-ride-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Validate deployment configuration
        run: |
          missing=0

          if [[ -z "${AWS_REGION}" ]]; then
            echo "::error::Missing AWS_REGION. Add it as a GitHub Actions repository variable or secret."
            missing=1
          fi

          if [[ -z "${S3_BUCKET}" ]]; then
            echo "::error::Missing S3_BUCKET. Add it as a GitHub Actions repository variable or secret."
            missing=1
          fi

          if [[ -z "${AWS_DEPLOY_ROLE_ARN}" ]]; then
            echo "::error::Missing AWS_DEPLOY_ROLE_ARN. Add it as a GitHub Actions repository secret."
            missing=1
          fi

          exit "${missing}"
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: npm run deploy:s3
